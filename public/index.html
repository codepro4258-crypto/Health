<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stroke Prevention — Patient</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Stroke Prevention</h1>
      <a href="/guardian.html">Guardian View</a>
    </header>

    <main class="container patient-layout">
      <section class="card">
        <h2>Today's Routine</h2>
        <p id="adherence">Loading...</p>
        <ul id="routine-list" class="list"></ul>
      </section>

      <section class="card">
        <h2>Log Vitals</h2>
        <form id="vitals-form" class="form-grid">
          <label>Systolic <input type="number" name="systolic" required /></label>
          <label>Diastolic <input type="number" name="diastolic" required /></label>
          <label>Pulse <input type="number" name="pulse" required /></label>
          <button type="submit">Save Vitals</button>
        </form>
        <p id="vitals-status"></p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
